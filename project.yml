name: PromptGIF
options:
  bundleIdPrefix: dev.ericslutz
  deploymentTarget:
    iOS: "26.5"
  xcodeVersion: "2650"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
packages:
  PromptGIFCore:
    path: Packages/PromptGIFCore
targets:
  PromptGIF:
    type: application
    platform: iOS
    sources:
      - App/PromptGIF
    resources:
      - App/PromptGIF/Assets.xcassets
    dependencies:
      - package: PromptGIFCore
      - target: PromptGIFMessagesExtension
    info:
      path: App/PromptGIF/Info.plist
      properties:
        CFBundleDisplayName: PromptGIF
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: App/PromptGIF/PromptGIF.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.PromptGIF
        PRODUCT_NAME: PromptGIF
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
  PromptGIFMessagesExtension:
    type: app-extension.messages
    platform: iOS
    sources:
      - Extensions/PromptGIFMessages
    resources:
      - Extensions/PromptGIFMessages/Assets.xcassets
    dependencies:
      - package: PromptGIFCore
      - sdk: Messages.framework
      - sdk: PhotosUI.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    info:
      path: Extensions/PromptGIFMessages/Info.plist
      properties:
        CFBundleDisplayName: PromptGIF
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
    entitlements:
      path: Extensions/PromptGIFMessages/PromptGIFMessages.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ericslutz.PromptGIF.MessagesExtension
        PRODUCT_NAME: PromptGIFMessagesExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
schemes:
  PromptGIF:
    build:
      targets:
        PromptGIF: all
        PromptGIFMessagesExtension: all
    run:
      config: Debug
